name: py-msa-ai-starter

x-python-env: &python-env
  env_file: [.env]
  restart: unless-stopped

services:
  # ── 인프라 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine   # 사실 저장(시세·기사·출처). 벡터 임베딩은 POC 제외(ADR 0006)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    ports: ["${POSTGRES_HOST_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 지식 그래프(관계·인과) — Community는 인스턴스당 DB 1개 → 프로젝트 전용 컨테이너 (ADR 0005)
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/convey-dev-pw}
    volumes:
      - neo4jdata:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 내부(컨테이너)=kafka:9092 · 외부(호스트)=localhost:29092 (로컬 검증·툴 접속용)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports: ["${KAFKA_HOST_PORT:-29092}:29092"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports: ["${KAFKAUI_PORT:-8090}:8080"]
    depends_on:
      kafka:
        condition: service_healthy

  # 기본 미기동 — 네이티브(호스트) ollama 재사용(11434 충돌 방지). 컨테이너로 쓰려면:
  #   docker compose --profile ollama up -d ollama   (이 경우 .env OLLAMA_HOST=http://ollama:11434)
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    ports: ["${OLLAMA_PORT:-11434}:11434"]
    healthcheck:
      test: ["CMD-SHELL", "ollama --version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 애플리케이션 ──────────────────────────────────────
  gateway:
    build: {context: ., dockerfile: gateway/Dockerfile}
    <<: *python-env
    ports: ["${GATEWAY_PORT:-8080}:8000"]   # 유일한 외부 진입점
    depends_on: [sample-domain, llm-inference, agent, research, content, issue-detector, publishing]

  # 인증은 Supabase(외부)로 위임 — 자체 auth 서비스 없음 (ADR 0007)
  sample-domain:
    build: {context: ., dockerfile: services/sample-domain/Dockerfile}
    <<: *python-env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/sample_db
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}

  llm-inference:
    build: {context: ., dockerfile: services/llm-inference/Dockerfile}
    <<: *python-env
    # ollama는 네이티브 재사용(OLLAMA_HOST=host.docker.internal) — 컨테이너 의존 없음

  # AI 에이전트 오케스트레이션(prompts+tools+RAG+멀티턴). 모델은 llm-inference에 위임.
  agent:
    build: {context: ., dockerfile: services/agent/Dockerfile}
    <<: *python-env
    depends_on: [llm-inference]

  # ── CONVEY 도메인 (코어 라운드) ──────────────────────
  research:
    build: {context: ., dockerfile: services/research/Dockerfile}
    <<: *python-env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/research_db
      NEO4J_URL: ${NEO4J_URL:-bolt://neo4j:7687}
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/convey-dev-pw}
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
      neo4j: {condition: service_healthy}

  # 뉴스·RSS 수집 + 종목·사건 태깅 워커 — HTTP 없음, Kafka로만 결합 (market-feed 원형 복제·확장)
  news-feed:
    build: {context: ., dockerfile: services/news-feed/Dockerfile}
    <<: *python-env
    depends_on:
      kafka: {condition: service_healthy}

  # 이슈 종목 선별 — 스트림 집계 랭킹(워커) + 조회 API. 알파2 (라운드②)
  issue-detector:
    build: {context: ., dockerfile: services/issue-detector/Dockerfile}
    <<: *python-env
    depends_on:
      kafka: {condition: service_healthy}

  # 정확 차트·수치 렌더 + ffmpeg 합성 → mp4. 알파3 (라운드④)
  video-assembly:
    build: {context: ., dockerfile: services/video-assembly/Dockerfile}
    <<: *python-env
    environment:
      MEDIA_DIR: /data/media
    volumes:
      - media:/data/media   # mp4 산출(쓰기) → content·publishing 공유
    depends_on:
      kafka: {condition: service_healthy}

  content:
    build: {context: ., dockerfile: services/content/Dockerfile}
    <<: *python-env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/content_db
    volumes:
      - media:/data/media   # 완성본 경로 기록·공유(읽기)
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
      agent: {condition: service_started}

  # 발행 — content.approved → YouTube 업로드(멱등·재시도) + 상태 조회. 알파4 (라운드⑤)
  publishing:
    build: {context: ., dockerfile: services/publishing/Dockerfile}
    <<: *python-env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/publishing_db
    volumes:
      - media:/data/media   # 업로드 시 mp4 읽기(발행 라운드)
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}

  # 외부 연동 워커(예: KIS) — HTTP 없음, 게이트웨이 뒤 아님, Kafka로만 결합
  market-feed:
    build: {context: ., dockerfile: services/market-feed/Dockerfile}
    <<: *python-env
    depends_on:
      kafka: {condition: service_healthy}

volumes:
  pgdata:
  neo4jdata:
  ollama:
  media:   # video-assembly 산출 mp4 — content·publishing 공유(ADR 0006 로컬 볼륨)
