<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CONVEY · 운영 콘솔</title>
<style>
  :root{
    --bg:#0c0c0e; --bg2:#141416; --panel:#151518; --panel2:#1b1b1f;
    --red:#e11d34; --red-d:#b3162a; --gold:#e9b44c; --gold-d:#c8963a;
    --ink:#ece7de; --mut:#8f8a82; --line:#2a2a30; --lime:#4ade80;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{color:var(--ink);
    font-family:-apple-system,"Apple SD Gothic Neo","맑은 고딕","Malgun Gothic","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(900px 500px at 85% -10%,#2a0a10 0%,transparent 55%),
      radial-gradient(800px 500px at -10% 110%,#1c1405 0%,transparent 50%),var(--bg);
    background-attachment:fixed}
  .wrap{max-width:100%;margin:0;padding:24px 34px 80px}
  header.top{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  header.top h1{font-size:24px;letter-spacing:5px;margin:0;font-weight:800}
  header.top h1 .c{color:var(--red)} header.top h1 .dot{color:var(--gold)}
  header.top .tag{font-size:11px;letter-spacing:2px;color:var(--gold);border:1px solid var(--gold-d);padding:2px 9px;border-radius:3px}

  /* 상단 탭 */
  .maintabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:22px}
  .maintab{cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:1px;
    color:var(--mut);background:none;border:none;padding:12px 22px;position:relative;transition:.14s}
  .maintab:hover{color:var(--ink)}
  .maintab.on{color:var(--ink)}
  .maintab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;
    background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px 3px 0 0}

  .panel{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:20px}
  .panel::before{content:"";position:absolute;left:18px;right:18px;top:0;height:2px;
    background:linear-gradient(90deg,var(--red),var(--gold));border-radius:0 0 2px 2px}
  .panel > h2{margin:6px 0 14px;font-size:12px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    display:flex;align-items:center;gap:8px}
  .panel > h2::before{content:"◆";color:var(--red);font-size:10px}

  /* 스텝 진행바 */
  .steps{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .step{flex:1;min-width:90px;font-size:11px;letter-spacing:.5px;color:var(--mut);background:var(--panel2);
    border:1px solid var(--line);border-radius:7px;padding:8px 10px;text-align:center;transition:.14s}
  .step .no{display:inline-block;width:18px;height:18px;line-height:18px;border-radius:50%;background:var(--line);
    color:var(--ink);font-weight:800;margin-right:5px;font-size:10px}
  .step.on{color:#fff;border-color:var(--red);background:#241014}
  .step.on .no{background:var(--red)}
  .step.done{color:var(--gold)} .step.done .no{background:var(--gold);color:#241a05}

  /* 버튼 */
  button.act{cursor:pointer;font-family:inherit;font-weight:800;letter-spacing:1px;font-size:14px;color:#fff;
    background:var(--red);border:none;padding:11px 22px;border-radius:7px;box-shadow:0 4px 14px #e11d3444;
    transition:transform .1s,box-shadow .15s,background .15s}
  button.act:hover{background:var(--red-d);transform:translateY(-1px)}
  button.act:disabled{opacity:.45;cursor:wait;box-shadow:none;transform:none}
  button.gold{background:linear-gradient(90deg,var(--gold),var(--gold-d));color:#241a05;box-shadow:0 4px 14px #e9b44c33}
  button.gold:hover{filter:brightness(1.06)}
  button.ghost{background:transparent;color:var(--mut);border:1px solid var(--line)}
  button.ghost:hover{color:var(--ink);border-color:#3a3a42}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}

  /* 선택칩(템플릿·배경) */
  .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{cursor:pointer;font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:9px;padding:12px 16px;transition:.14s;min-width:150px}
  .chip:hover{border-color:#3a3a42}
  .chip.on{border-color:var(--gold);background:#241a05;box-shadow:0 0 0 2px #e9b44c33}
  .chip .t{font-weight:800;color:var(--gold);letter-spacing:.5px}
  .chip .d{font-size:11px;color:var(--mut);margin-top:4px;line-height:1.4}

  /* 기사 목록 */
  .arts{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto}
  .art{display:flex;align-items:center;gap:14px;background:var(--panel2);border:1px solid var(--line);
    border-left:3px solid var(--gold-d);border-radius:8px;padding:12px 14px;transition:.12s}
  .art:hover{border-color:#3a3a42;background:#202026}
  .art .info{flex:1;min-width:0}
  .art .t{color:var(--ink);font-size:14px;font-weight:600;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .art .sub{font-size:11px;color:var(--mut);margin-top:4px}
  .art .sub .stk{color:var(--gold)}

  /* 시나리오 편집 */
  .seg{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
  .seg .k{flex:0 0 auto;font-size:10px;font-weight:800;color:var(--red);border:1px solid var(--red);
    border-radius:999px;padding:2px 9px;letter-spacing:.5px;margin-top:6px}
  .seg textarea{flex:1;background:#0b0b0d;border:1px solid var(--line);color:var(--ink);font-family:inherit;
    font-size:13px;line-height:1.5;padding:8px 10px;border-radius:6px;resize:vertical;min-height:44px;outline:none}
  .seg textarea:focus{border-color:var(--gold)}

  /* 미리보기 */
  .preview{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
  .vidbox{position:relative;flex:0 0 auto;padding:6px}
  .vidbox::before,.vidbox::after{content:"";position:absolute;width:22px;height:22px}
  .vidbox::before{top:0;left:0;border-top:3px solid var(--gold);border-left:3px solid var(--gold);border-radius:6px 0 0 0}
  .vidbox::after{bottom:0;right:0;border-bottom:3px solid var(--red);border-right:3px solid var(--red);border-radius:0 0 6px 0}
  .vidbox video{width:250px;max-width:66vw;aspect-ratio:9/16;background:#000;display:block;border-radius:6px;box-shadow:0 10px 34px #000a}
  .pmeta{flex:1;min-width:240px;color:var(--mut);font-size:13px;line-height:1.8}
  .pmeta .pttl{color:var(--ink);font-size:18px;font-weight:800;margin-bottom:4px}
  .pmeta .pttl .dot{color:var(--gold)}
  .pmeta .stk{color:var(--gold)}
  .pmeta .seg2{display:flex;gap:8px;margin-bottom:8px} .pmeta .seg2 .k{flex:0 0 auto;font-size:10px;font-weight:800;color:var(--red);border:1px solid var(--red);border-radius:999px;padding:1px 8px;height:fit-content}
  .pmeta .seg2 .tx{color:var(--ink);font-size:13px}

  /* 생성쇼츠 탭 */
  .filt{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .filt .f{cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:1px;color:var(--mut);background:var(--panel2);
    border:1px solid var(--line);padding:7px 16px;border-radius:999px;transition:.14s}
  .filt .f.on{color:#fff;background:var(--red);border-color:var(--red);font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:15px 16px 13px;cursor:pointer;transition:.14s}
  .card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;background:var(--mut)}
  .card.done::after{background:linear-gradient(var(--gold),var(--red))} .card.run::after{background:var(--gold)} .card.fail::after{background:#5a2a30}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 26px #000a;border-color:#3a3a42}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px #e9b44c44}
  .card .jid{font-size:10px;color:var(--mut);letter-spacing:1px}
  .card .ttl{font-size:15px;color:var(--ink);font-weight:700;margin:6px 0 9px;line-height:1.35;min-height:2.7em;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .stock{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:12px} .card .stock.none{color:var(--mut);font-weight:400}
  .card .foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card .time{font-size:10px;color:var(--mut)}
  .badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:999px;border:1px solid currentColor;font-weight:800}
  .badge.done{color:var(--lime)} .badge.run{color:var(--gold);animation:pulse 1.2s infinite} .badge.fail{color:#e06a78} .badge.wait{color:var(--gold)}
  @keyframes pulse{50%{opacity:.4}}
  .empty,.loading{color:var(--mut);font-size:13px;padding:12px 0}
  .hidden{display:none!important}
  #toast{position:fixed;right:20px;bottom:20px;z-index:20;display:flex;flex-direction:column;gap:8px}
  .t{background:var(--panel2);border:1px solid var(--line);border-left:4px solid var(--gold);color:var(--ink);
    padding:11px 16px;font-size:13px;border-radius:8px;box-shadow:0 10px 28px #000a;animation:tin .2s}
  .t.err{border-left-color:var(--red)}
  @keyframes tin{from{transform:translateX(20px);opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1><span class="c">C</span>ONVEY<span class="dot">.</span></h1>
    <span class="tag">운영 콘솔</span>
  </header>

  <div class="maintabs">
    <button class="maintab on" data-tab="make">오늘자 기사</button>
    <button class="maintab" data-tab="shorts">생성쇼츠</button>
  </div>

  <!-- ═══ 탭1: 오늘자 기사 (마법사) ═══ -->
  <div id="tab-make">
    <div class="steps" id="steps">
      <div class="step on" data-s="1"><span class="no">1</span>기사 선택</div>
      <div class="step" data-s="2"><span class="no">2</span>템플릿</div>
      <div class="step" data-s="3"><span class="no">3</span>시나리오 수정</div>
      <div class="step" data-s="4"><span class="no">4</span>배경·생성</div>
      <div class="step" data-s="5"><span class="no">5</span>미리보기</div>
    </div>

    <!-- 1) 기사 -->
    <section class="panel" id="s1">
      <h2>오늘자 수집 기사</h2>
      <div class="arts" id="arts"><div class="loading">불러오는 중…</div></div>
    </section>

    <!-- 2) 템플릿 -->
    <section class="panel hidden" id="s2">
      <h2>시나리오 템플릿 선택</h2>
      <div style="color:var(--mut);font-size:12px;margin-bottom:12px" id="s2sel"></div>
      <div class="chips" id="tpl">
        <div class="chip" data-v="breaking"><div class="t">속보형</div><div class="d">훅 → 종가·등락 → 한 줄. 짧고 빠르게.</div></div>
        <div class="chip on" data-v="analysis"><div class="t">분석형</div><div class="d">훅 → 수치 → 사실 2~3 → 거시맥락.</div></div>
        <div class="chip" data-v="story"><div class="t">스토리형</div><div class="d">도입 → 사건 전개 → 전망 마무리.</div></div>
      </div>
      <div class="row"><button class="ghost" data-back="1">← 기사</button><button class="act" id="genBtn">시나리오 생성 ▶</button></div>
    </section>

    <!-- 3) 시나리오 수정 -->
    <section class="panel hidden" id="s3">
      <h2>시나리오 수정</h2>
      <div id="editArea"><div class="loading">시나리오 생성 중…</div></div>
    </section>

    <!-- 4) 배경·생성 -->
    <section class="panel hidden" id="s4">
      <h2>배경 선택 · 쇼츠 생성</h2>
      <div class="chips" id="bg">
        <div class="chip on" data-v="real"><div class="t">실사</div><div class="d">종목 대표 산업 실사 영상.</div></div>
        <div class="chip" data-v="anim"><div class="t">애니메이션</div><div class="d">모션그래픽·추상 루프.</div></div>
      </div>
      <div class="row"><button class="ghost" data-back="3">← 수정</button><button class="act gold" id="approveBtn">승인 → 쇼츠 생성 ▶</button></div>
    </section>

    <!-- 5) 미리보기 -->
    <section class="panel hidden" id="s5">
      <h2>미리보기</h2>
      <div class="preview">
        <div class="vidbox"><video id="wplayer" controls preload="metadata"></video></div>
        <div class="pmeta" id="wmeta"></div>
      </div>
      <div class="row"><button class="act" id="restartBtn">새 제작 시작 ↺</button></div>
    </section>
  </div>

  <!-- ═══ 탭2: 생성쇼츠 ═══ -->
  <div id="tab-shorts" class="hidden">
    <section class="panel hidden" id="pvPanel">
      <h2>미리보기</h2>
      <div class="preview">
        <div class="vidbox"><video id="player" controls preload="metadata"></video></div>
        <div class="pmeta" id="pmeta"></div>
      </div>
    </section>
    <section class="panel">
      <h2>내 쇼츠</h2>
      <div class="filt" id="filt">
        <button class="f on" data-f="done">완료 <span id="n-done">0</span></button>
        <button class="f" data-f="fail">실패 <span id="n-fail">0</span></button>
        <button class="f" data-f="all">전체 <span id="n-all">0</span></button>
      </div>
      <div class="grid" id="grid"><div class="empty">불러오는 중…</div></div>
    </section>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";
const RUNNING=new Set(["pending","scripting","assembling","media"]);
const DONE=new Set(["ready","approved"]);
const KIND_LABEL={hook:"훅",chart:"차트",fact:"사실",macro:"거시",closing:"마무리"};
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
let items=[], filter="done", selected=null, pollTimer=null;
// 마법사 상태
const wz={article:null, template:"analysis", background:"real", job:null, step:1};

function toast(m,err){const e=document.createElement("div");e.className="t"+(err?" err":"");e.textContent=m;$("#toast").appendChild(e);setTimeout(()=>e.remove(),3400);}
function cls(s){return s==="failed"?"fail":(DONE.has(s)?"done":"run");}
function fmt(iso){try{return String(iso).replace("T"," ").slice(5,16);}catch{return iso||"";}}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function host(u){try{return new URL(u).hostname;}catch{return"출처";}}

// ── 탭 전환 ──
$$(".maintab").forEach(b=>b.onclick=()=>{
  $$(".maintab").forEach(t=>t.classList.toggle("on",t===b));
  const t=b.dataset.tab;
  $("#tab-make").classList.toggle("hidden",t!=="make");
  $("#tab-shorts").classList.toggle("hidden",t!=="shorts");
  if(t==="shorts") loadJobs();
});

// ── 마법사 스텝 표시 ──
function goStep(n){
  wz.step=n;
  [1,2,3,4,5].forEach(i=>{
    $("#s"+i).classList.toggle("hidden",i!==n);
    const st=$(`.step[data-s="${i}"]`);
    st.classList.toggle("on",i===n); st.classList.toggle("done",i<n);
  });
}
$$(".step").forEach(st=>st.onclick=()=>{ const n=+st.dataset.s; if(n<wz.step) goStep(n); });
$$("[data-back]").forEach(b=>b.onclick=()=>goStep(+b.dataset.back));

// ── 1) 기사 ──
async function loadArticles(){
  let data=[];
  try{const r=await fetch("/ui/articles?limit=40"); if(r.ok) data=(await r.json()).items||[];}catch(e){}
  const box=$("#arts");
  if(!data.length){box.innerHTML=`<div class="empty">오늘 수집된 기사가 없습니다.</div>`;return;}
  box.innerHTML=data.map(a=>{
    const tagged=!!a.ticker;
    const stk=a.name?`<span class="stk">◈ ${esc(a.name)}</span> · `:`<span style="color:#c96">종목 미태깅(제작 불가)</span> · `;
    const btn=tagged
      ? `<button class="act" data-title="${esc(a.title)}" data-ticker="${esc(a.ticker)}" data-aid="${a.article_id}">진행 ▶</button>`
      : `<button class="ghost" disabled title="종목이 태깅된 기사만 제작 가능(시세 근거 필요)">진행 ✕</button>`;
    return `<div class="art"><div class="info"><div class="t">${esc(a.title)}</div>
      <div class="sub">${stk}${esc(fmt(a.published_at))} · <a href="${esc(a.source_url)}" target="_blank" rel="noopener" style="color:var(--mut)">${esc(host(a.source_url))}</a></div></div>
      ${btn}</div>`;
  }).join("");
  box.querySelectorAll("button.act").forEach(b=>b.onclick=()=>{
    wz.article={title:b.dataset.title, ticker:b.dataset.ticker||null, article_id:+b.dataset.aid};
    $("#s2sel").innerHTML=`선택: <b style="color:var(--ink)">${esc(wz.article.title)}</b>`;
    goStep(2);
  });
}

// ── 2) 템플릿 선택 → 생성 ──
$("#tpl").onclick=e=>{const c=e.target.closest(".chip");if(!c)return;
  wz.template=c.dataset.v; $$("#tpl .chip").forEach(x=>x.classList.toggle("on",x===c));};
$("#genBtn").onclick=async()=>{
  const btn=$("#genBtn"); btn.disabled=true; btn.textContent="생성 중…";
  try{
    const r=await fetch("/ui/generate",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title:wz.article.title,ticker:wz.article.ticker,article_id:wz.article.article_id,template:wz.template})});
    if(!r.ok) throw new Error(r.status);
    wz.job=(await r.json()).job_id;
    editSections=[]; editShownFor=null;  // 새 초안 — 에디터 재그리기
    toast(`시나리오 생성 시작 · job #${wz.job}`);
    goStep(3); $("#editArea").innerHTML=`<div class="loading">시나리오 생성 중… (${wz.template}) — 최대 30초쯤 걸립니다.</div>`;
    ensurePolling(); loadJobs();  // 2.5초 기다리지 말고 즉시 한 번 폴링
  }catch(e){toast("생성 실패: "+e.message,true);}
  finally{btn.disabled=false; btn.textContent="시나리오 생성 ▶";}
};

// ── 3) 시나리오 수정 ──
let editSections=[];
async function showEditor(){
  let s={sections:[]};
  try{const r=await fetch(`/ui/jobs/${wz.job}/script`); if(r.ok) s=await r.json();}catch(e){}
  editSections=s.sections||[];
  if(!editSections.length){$("#editArea").innerHTML=`<div class="loading">시나리오가 비었습니다.</div>`;return;}
  $("#editArea").innerHTML=editSections.map((x,i)=>
    `<div class="seg"><span class="k">${esc(KIND_LABEL[x.kind]||x.kind)}</span>
     <textarea data-i="${i}" rows="2">${esc(x.text)}</textarea></div>`).join("")+
    `<div class="row"><button class="ghost" data-back="2">← 템플릿</button>
     <button class="act" id="saveBtn">저장</button>
     <button class="act gold" id="toBgBtn">배경 선택 →</button></div>`;
  $$("#editArea [data-back]").forEach(b=>b.onclick=()=>goStep(+b.dataset.back));
  $("#saveBtn").onclick=()=>saveScript(false);
  $("#toBgBtn").onclick=()=>saveScript(true);
}
async function saveScript(advance){
  const secs=[...$$("#editArea textarea")].map(t=>({kind:editSections[+t.dataset.i].kind, text:t.value}));
  try{
    const r=await fetch(`/ui/jobs/${wz.job}/script`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({sections:secs})});
    if(!r.ok) throw new Error(r.status);
    toast("시나리오 저장됨");
    if(advance) goStep(4);
  }catch(e){toast("저장 실패: "+e.message,true);}
}

// ── 4) 배경 선택 → 승인/생성 ──
$("#bg").onclick=e=>{const c=e.target.closest(".chip");if(!c)return;
  wz.background=c.dataset.v; $$("#bg .chip").forEach(x=>x.classList.toggle("on",x===c));};
$("#approveBtn").onclick=async()=>{
  const btn=$("#approveBtn"); btn.disabled=true; btn.textContent="생성 중…";
  try{
    const r=await fetch(`/ui/jobs/${wz.job}/approve-scenario`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({background:wz.background})});
    if(!r.ok) throw new Error(r.status);
    toast(`쇼츠 생성 시작 (job #${wz.job}, ${wz.background==="anim"?"애니":"실사"})`);
    goStep(5); $("#wmeta").innerHTML=`<div class="loading">합성 중… 잠시만요.</div>`;
    ensurePolling();
  }catch(e){toast("승인 실패: "+e.message,true); btn.disabled=false; btn.textContent="승인 → 쇼츠 생성 ▶";}
};
$("#restartBtn").onclick=()=>{wz.article=null;wz.job=null;editSections=[];editShownFor=null;$("#wplayer").removeAttribute("src");goStep(1);loadArticles();};

// 마법사 잡 상태 반영(폴링)
let editShownFor=null;  // 에디터를 그려준 job_id(중복/누락 방지)
function refreshWizard(){
  if(wz.job==null) return;
  const job=items.find(i=>i.job_id===wz.job);
  if(!job) return;
  if(job.status==="failed"){ if(wz.step===3)$("#editArea").innerHTML=`<div class="loading">생성 실패: ${esc(job.error||"")}</div>`; if(wz.step===5)$("#wmeta").innerHTML=`<div class="loading">합성 실패: ${esc(job.error||"")}</div>`; return; }
  if(wz.step===3){
    if(job.status==="scenario_ready" && editShownFor!==wz.job){ editShownFor=wz.job; showEditor(); }
  }
  if(wz.step===5 && DONE.has(job.status) && job.content_id!=null && !$("#wplayer").src){
    playInto("#wplayer","#wmeta", job.content_id, job.topic, job.name);
  }
}

// ── 미리보기 재생(공용) ──
async function playInto(vSel,mSel,cid,title,name){
  const v=$(vSel); v.src=`/ui/contents/${cid}/video`; v.play().catch(()=>{});
  $(mSel).innerHTML=`<div class="pttl">${esc(title)}<span class="dot">.</span></div>`+
    `<div style="margin-bottom:12px">${name?`<span class="stk">◈ ${esc(name)}</span> · `:""}content #${cid}</div>`+
    `<div class="loading">시나리오 불러오는 중…</div>`;
  let s={sections:[]};
  try{const r=await fetch(`/ui/contents/${cid}/script`); if(r.ok) s=await r.json();}catch(e){}
  const segs=(s.sections||[]).map(x=>`<div class="seg2"><span class="k">${esc(KIND_LABEL[x.kind]||x.kind)}</span><span class="tx">${esc(x.text)}</span></div>`).join("");
  const meta=$(mSel); const ld=meta.querySelector(".loading"); if(ld) ld.outerHTML=segs;
}

// ── 탭2: 잡 카드 ──
function matches(it){if(filter==="all")return true;if(filter==="fail")return it.status==="failed";return DONE.has(it.status);}
async function loadJobs(){
  try{const r=await fetch("/ui/jobs?limit=200");if(!r.ok)throw 0;items=(await r.json()).items||[];}catch(e){return;}
  renderJobs(); refreshWizard();
  if(items.some(i=>RUNNING.has(i.status))||wz.job!=null) ensurePolling(); else stopPolling();
}
function ensurePolling(){if(!pollTimer)pollTimer=setInterval(loadJobs,2500);}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
function renderJobs(){
  $("#n-done").textContent=items.filter(i=>DONE.has(i.status)).length;
  $("#n-fail").textContent=items.filter(i=>i.status==="failed").length;
  $("#n-all").textContent=items.length;
  const view=items.filter(matches),grid=$("#grid");
  if(!view.length){grid.innerHTML=`<div class="empty">해당하는 쇼츠가 없습니다.</div>`;return;}
  grid.innerHTML=view.map(it=>{const c=cls(it.status),playable=DONE.has(it.status)&&it.content_id!=null;
    const sel=(selected!=null&&it.content_id===selected)?" sel":"";
    const stock=it.name?`<div class="stock">◈ ${esc(it.name)}</div>`:`<div class="stock none">종목 미지정</div>`;
    return `<div class="card ${c}${sel}" data-cid="${playable?it.content_id:""}" data-title="${esc(it.topic)}" data-name="${esc(it.name||"")}">
      <div class="jid">JOB #${it.job_id}</div><div class="ttl">${esc(it.topic)}</div>${stock}
      <div class="foot"><span class="time">${fmt(it.created_at)} UTC</span><span class="badge ${c}">${it.status}</span></div></div>`;
  }).join("");
  grid.querySelectorAll(".card").forEach(card=>card.onclick=()=>{const cid=card.dataset.cid;
    if(!cid)return; selected=+cid; $("#pvPanel").classList.remove("hidden");
    playInto("#player","#pmeta",+cid,card.dataset.title,card.dataset.name); renderJobs();
    window.scrollTo({top:0,behavior:"smooth"});});
}
$("#filt").onclick=e=>{const b=e.target.closest(".f");if(!b)return;filter=b.dataset.f;
  $$("#filt .f").forEach(f=>f.classList.toggle("on",f===b));renderJobs();};

loadArticles();
loadJobs();
</script>
</body>
</html>
